name: Tests

# Jobs run inside almalinux:9 to match the deployment environment — Python
# 3.9 plus the system libs the exporter imports at startup (notably
# liberasurecode, which swift needs). The runner host is ubuntu-latest for
# cost; the container provides the real test environment.

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths-ignore:
      - "**.md"
      - "**.rst"
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "**.rst"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    container: almalinux:9
    steps:
      - name: Install prerequisites
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            git python3 python3-pip

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required by setuptools_scm for version derivation

      - name: Install tox
        run: python3 -m pip install --upgrade pip 'tox<5'

      - name: Run linters
        run: tox -e lint

  unit:
    runs-on: ubuntu-latest
    container: almalinux:9
    steps:
      - name: Install build + runtime prerequisites
        run: |
          dnf install -y epel-release
          dnf install -y --setopt=install_weak_deps=False \
            git python3 python3-pip python3-devel \
            gcc libxml2-devel libxslt-devel openssl-devel libffi-devel \
            liberasurecode-devel

      - uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-el9-${{ hashFiles('requirements.txt', 'tox.ini') }}
          restore-keys: pip-el9-

      - name: Install tox
        run: python3 -m pip install --upgrade pip 'tox<5'

      - name: Run unit tests
        run: tox -e unit
