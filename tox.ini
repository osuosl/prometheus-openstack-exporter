[tox]
skipsdist=True
skip_missing_interpreters = True
envlist = lint, unit

[testenv]
basepython = python3
setenv =
  PYTHONPATH = {toxinidir}
passenv = *

[testenv:lint]
commands =
    black --check --diff --color .
    isort --check --diff --color .
    flake8
deps =
    black
    colorama
    flake8
    flake8-colors
    flake8-docstrings
    flake8-import-order
    flake8-pyproject
    isort
    pep8-naming
    # so pylint and mypy can reason about the code

[testenv:reformat]
commands =
    black .
    isort .
deps =
    black
    isort

[testenv:unit]
setenv =
    {[testenv]setenv}
deps =
    # Pin OpenStack-side deps to the release we currently ship for — keeps
    # CI in sync with the RPM build's upper-constraints. Bump in lockstep
    # with the rpms/openstack_exporter Dockerfile's OS_CONSTRAINTS_REF.
    -chttps://opendev.org/openstack/requirements/raw/tag/yoga-eom/upper-constraints.txt
    -rrequirements.txt
commands = python -m unittest discover tests -v
