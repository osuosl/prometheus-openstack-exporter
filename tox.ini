[tox]
skipsdist=True
skip_missing_interpreters = True
envlist = lint, unit

[testenv]
basepython = python3
setenv =
  PYTHONPATH = {toxinidir}
passenv = *

[testenv:lint]
commands =
    black --check --diff --color .
    isort --check --diff --color .
    flake8
deps =
    # Pin black so formatting decisions are reproducible between developer
    # laptops and CI. Bump deliberately and reformat in the same commit.
    black==25.11.0
    colorama
    flake8
    flake8-colors
    flake8-docstrings
    flake8-import-order
    flake8-pyproject
    isort
    pep8-naming
    # so pylint and mypy can reason about the code

[testenv:reformat]
commands =
    black .
    isort .
deps =
    black==25.11.0
    isort

[testenv:unit]
setenv =
    {[testenv]setenv}
deps =
    # Pin OpenStack-side deps to the release we currently ship for — keeps
    # CI in sync with the RPM build's upper-constraints. Bump in lockstep
    # with the rpms/openstack_exporter Dockerfile's OS_CONSTRAINTS_REF.
    -chttps://opendev.org/openstack/requirements/raw/tag/yoga-eom/upper-constraints.txt
    # setuptools>=81 dropped pkg_resources, which pbr (and therefore most
    # OpenStack clients) still imports at module load. Yoga's constraints
    # only pin setuptools for py3.6/3.8 — pin it here for our py3.9 target.
    setuptools<81
    -rrequirements.txt
commands = python -m unittest discover tests -v
